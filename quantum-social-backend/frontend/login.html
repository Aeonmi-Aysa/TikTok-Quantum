<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — Quantum Social</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --surface2: #13131e;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --danger: #ef4444;
    --success: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -40%;
    right: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(circle, rgba(6,182,212,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    font-size: 24px;
    margin-bottom: 16px;
  }

  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }

  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    border: none;
    background: none;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: #fff;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-bottom: 12px;
  }

  .btn-outline:hover { border-color: var(--accent); background: rgba(124,58,237,0.05); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--muted);
    font-size: 13px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .alert {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
  }

  .alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
  .alert.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
  .alert.show { display: block; }

  .footer-link {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--muted);
  }

  .footer-link a {
    color: var(--accent2);
    text-decoration: none;
    font-weight: 500;
  }

  .footer-link a:hover { text-decoration: underline; }

  .back-link {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
  }

  .back-link a {
    color: var(--muted);
    text-decoration: none;
  }

  .back-link a:hover { color: var(--text); }

  /* Phone tab */
  .phone-row {
    display: flex;
    gap: 10px;
  }

  .phone-code {
    width: 90px;
    flex-shrink: 0;
  }

  /* OTP input */
  .otp-inputs {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .otp-inputs input {
    width: 48px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    padding: 12px 8px;
    letter-spacing: 0;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .resend-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
  }

  #resend-btn {
    background: none;
    border: none;
    color: var(--accent2);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    padding: 0;
  }

  #resend-btn:disabled { color: var(--muted); cursor: not-allowed; }

  .oauth-icon { width: 20px; height: 20px; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">⚛</div>
    <h1>Quantum Social</h1>
    <p>Sign in to your account</p>
  </div>

  <div id="alert" class="alert"></div>

  <!-- ── AUTH METHOD TABS ─────────────────────────────── -->
  <div id="main-panel">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('email')">Email</button>
      <button class="tab" onclick="switchTab('phone')">Phone</button>
    </div>

    <!-- Email panel -->
    <div id="tab-email">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" id="email-btn" onclick="signInEmail()">
        Sign In
      </button>

      <div class="divider">or continue with</div>

      <button class="btn btn-outline" onclick="signInGoogle()">
        <svg class="oauth-icon" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <button class="btn btn-outline" onclick="signInGitHub()">
        <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/>
        </svg>
        Continue with GitHub
      </button>
    </div>

    <!-- Phone panel -->
    <div id="tab-phone" style="display:none">
      <div class="form-group">
        <label>Phone Number</label>
        <div class="phone-row">
          <input class="phone-code" type="text" id="phone-code" value="+1" placeholder="+1" />
          <input type="tel" id="phone-input" placeholder="555 000 0000" />
        </div>
      </div>
      <button class="btn btn-primary" id="phone-btn" onclick="sendPhoneOTP()">
        Send Code
      </button>
    </div>
  </div>

  <!-- ── OTP PANEL (phone verification) ──────────────── -->
  <div id="otp-panel" style="display:none">
    <p style="text-align:center;color:var(--muted);font-size:14px;margin-bottom:24px;">
      Enter the 6-digit code sent to<br/>
      <strong id="otp-target" style="color:var(--text)"></strong>
    </p>

    <div class="otp-inputs" id="otp-boxes">
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
      <input type="text" maxlength="1" inputmode="numeric" />
    </div>

    <div class="resend-row">
      <span id="countdown-text"></span>
      <button id="resend-btn" disabled onclick="resendOTP()">Resend</button>
    </div>

    <button class="btn btn-primary" id="otp-verify-btn" onclick="verifyPhoneOTP()" style="margin-top:24px;">
      Verify &amp; Sign In
    </button>

    <button onclick="backToMain()" style="width:100%;margin-top:12px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;">
      ← Use a different number
    </button>
  </div>

  <div class="footer-link">
    Don't have an account? <a href="signup.html">Create one free</a>
  </div>

  <div class="back-link">
    <a href="https://aeonmi.ai">← Back to aeonmi.ai</a>
  </div>
</div>

<script>
  // ── CONFIG ─────────────────────────────────────────────
  const SUPABASE_URL  = "https://qdnijmpcedgrpalnlojp.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkbmlqbXBjZWRncnBhbG5sb2pwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3MTE2NDgsImV4cCI6MjA4NDI4NzY0OH0.3MXwffoZRvDBGLUCBrKSfy0F-O5ZCtMk-tSWyvFMpNo";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── REDIRECT IF ALREADY SIGNED IN ──────────────────────
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = "dashboard.html";
  })();

  // ── TAB SWITCHING ───────────────────────────────────────
  let activeTab = 'email';
  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'email' && i === 0) || (tab === 'phone' && i === 1));
    });
    document.getElementById('tab-email').style.display = tab === 'email' ? '' : 'none';
    document.getElementById('tab-phone').style.display = tab === 'phone' ? '' : 'none';
    clearAlert();
  }

  // ── ALERT ──────────────────────────────────────────────
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
  }
  function clearAlert() {
    document.getElementById('alert').className = 'alert';
  }

  // ── LOADING STATE ───────────────────────────────────────
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn._text = btn.innerHTML;
      btn.innerHTML = '<div class="spinner"></div>';
      btn.disabled = true;
    } else {
      btn.innerHTML = btn._text || btn.innerHTML;
      btn.disabled = false;
    }
  }

  // ── EMAIL SIGN IN ───────────────────────────────────────
  async function signInEmail() {
    clearAlert();
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;
    if (!email || !password) return showAlert('Email and password are required.');

    setLoading('email-btn', true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading('email-btn', false);

    if (error) return showAlert(error.message);

    // Check for redirect param (Stripe checkout, etc.)
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || 'dashboard.html';
  }

  // ── GOOGLE OAUTH ────────────────────────────────────────
  async function signInGoogle() {
    clearAlert();
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: `${window.location.origin}/dashboard.html` }
    });
    if (error) showAlert(error.message);
  }

  // ── GITHUB OAUTH ────────────────────────────────────────
  async function signInGitHub() {
    clearAlert();
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'github',
      options: { redirectTo: `${window.location.origin}/dashboard.html` }
    });
    if (error) showAlert(error.message);
  }

  // ── PHONE OTP ───────────────────────────────────────────
  let currentPhone = '';
  async function sendPhoneOTP() {
    clearAlert();
    const code = document.getElementById('phone-code').value.trim();
    const num  = document.getElementById('phone-input').value.trim();
    if (!num) return showAlert('Enter your phone number.');
    currentPhone = `${code}${num.replace(/\s/g, '')}`;

    setLoading('phone-btn', true);
    const { error } = await sb.auth.signInWithOtp({ phone: currentPhone });
    setLoading('phone-btn', false);

    if (error) return showAlert(error.message);
    showOTPPanel(currentPhone);
  }

  function showOTPPanel(phone) {
    document.getElementById('main-panel').style.display = 'none';
    document.getElementById('otp-panel').style.display = '';
    document.getElementById('otp-target').textContent = phone;
    setupOTPBoxes();
    startCountdown(60);
  }

  function backToMain() {
    document.getElementById('main-panel').style.display = '';
    document.getElementById('otp-panel').style.display = 'none';
    clearAlert();
  }

  // ── OTP BOX KEYBOARD NAVIGATION ─────────────────────────
  function setupOTPBoxes() {
    const boxes = document.querySelectorAll('#otp-boxes input');
    boxes.forEach((box, i) => {
      box.value = '';
      box.addEventListener('input', () => {
        if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
      });
    });
    boxes[0].focus();
  }

  function getOTPValue() {
    return [...document.querySelectorAll('#otp-boxes input')].map(b => b.value).join('');
  }

  async function verifyPhoneOTP() {
    clearAlert();
    const token = getOTPValue();
    if (token.length !== 6) return showAlert('Enter all 6 digits.');

    setLoading('otp-verify-btn', true);
    const { error } = await sb.auth.verifyOtp({ phone: currentPhone, token, type: 'sms' });
    setLoading('otp-verify-btn', false);

    if (error) return showAlert(error.message);

    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || 'dashboard.html';
  }

  // ── COUNTDOWN + RESEND ──────────────────────────────────
  let countdownTimer;
  function startCountdown(seconds) {
    const resendBtn = document.getElementById('resend-btn');
    const countEl = document.getElementById('countdown-text');
    resendBtn.disabled = true;
    clearInterval(countdownTimer);
    let remaining = seconds;
    countEl.textContent = `Resend in ${remaining}s`;
    countdownTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(countdownTimer);
        countEl.textContent = '';
        resendBtn.disabled = false;
      } else {
        countEl.textContent = `Resend in ${remaining}s`;
      }
    }, 1000);
  }

  async function resendOTP() {
    clearAlert();
    const { error } = await sb.auth.signInWithOtp({ phone: currentPhone });
    if (error) return showAlert(error.message);
    showAlert('Code resent.', 'success');
    startCountdown(60);
  }

  // ── ENTER KEY SUBMIT ────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('otp-panel').style.display !== 'none') {
      verifyPhoneOTP();
    } else if (activeTab === 'email') {
      signInEmail();
    } else {
      sendPhoneOTP();
    }
  });
</script>
</body>
</html>
